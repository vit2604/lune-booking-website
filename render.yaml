services:
  - type: web
    name: lune-booking-api
    runtime: node
    rootDir: server
    region: singapore
    plan: free
    buildCommand: npm ci && npm run prisma:generate
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: SOCKET_CORS_ORIGIN
        sync: false
      - key: BCRYPT_SALT_ROUNDS
        value: 10
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: CURRENCY_PROVIDER
        value: exchangerate-api
      - key: FRANKFURTER_BASE_URL
        value: https://api.frankfurter.dev/v1
      - key: EXCHANGE_RATE_BASE_URL
        value: https://open.er-api.com/v6/latest
      - key: BLUEJAY_ENABLED
        value: 'true'
      - key: BLUEJAY_CREATE_BOOKING_ENABLED
        value: 'true'
      - key: BLUEJAY_API_BASE_URL
        value: https://api-pms.bluejaypms.com/api/v2
      - key: BLUEJAY_AVAILABILITY_PATH
        value: /search-roomtypes
      - key: BLUEJAY_AVAILABILITY_METHOD
        value: GET
      - key: BLUEJAY_API_TOKEN
        sync: false
      - key: BLUEJAY_AUTH_HEADER_NAME
        value: ApiKey
      - key: BLUEJAY_AUTH_HEADER_PREFIX
        value: none
      - key: BLUEJAY_PROPERTY_ID
        value: '6439'
      - key: BLUEJAY_CHANNEL_CODE
        value: BEL
      - key: BLUEJAY_ROOM_MAPPING_JSON
        value: '{"one-bedroom-condo":"12666","one-bedroom-apartment-balcony":"12663","two-bedroom-apartment":"12665","studio-two-bed-balcony":"12664","two-bedroom-apartment-balcony":"12662"}'
      - key: BLUEJAY_RATEPLAN_MAPPING_JSON
        value: '{}'
      - key: BLUEJAY_USER_AGENT
        value: WebLuneBluejayAdapter/1.0
      - key: BLUEJAY_TIMEOUT_MS
        value: '10000'
      - key: BLUEJAY_FAIL_CLOSED
        value: 'true'
      - key: PAYOS_ENABLED
        value: 'false'
      - key: PAYOS_CLIENT_ID
        sync: false
      - key: PAYOS_API_KEY
        sync: false
      - key: PAYOS_CHECKSUM_KEY
        sync: false
      - key: PAYOS_RETURN_URL
        value: https://www.luneboutiquedanang.com/success
      - key: PAYOS_CANCEL_URL
        value: https://www.luneboutiquedanang.com/payment
      - key: PAYOS_WEBHOOK_URL
        sync: false
      - key: PAYOS_TIMEOUT_MS
        value: '15000'
