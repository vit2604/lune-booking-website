services:
  postgres:
    image: postgres:16-alpine
    container_name: lune_booking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lune_booking_db
      POSTGRES_USER: lune_user
      POSTGRES_PASSWORD: lune_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lune_user -d lune_booking_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
