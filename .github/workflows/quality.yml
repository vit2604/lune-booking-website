name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend schema check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://lune_user:lune_password@localhost:5432/lune_booking_db?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Validate Prisma schema
        working-directory: server
        run: npx prisma validate

      - name: Generate Prisma client
        working-directory: server
        run: npm run prisma:generate
