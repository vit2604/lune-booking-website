name: Keep backend awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          curl -fsS --retry 3 --retry-delay 10 --max-time 90 \
            https://lune-booking-api.onrender.com/api/health
